        // --- WEB AUDIO API (SOUND EFFECTS) ---
        let audioCtx = null;
        const playSfx = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return; 

                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if (type === 'correct') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(600, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1); 
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'incorrect') {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2); 
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'click') {
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05); 
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.05);
                }
            } catch (err) {
                console.warn("Efek suara tidak didukung.", err);
            }
        };

            const isClickable = e.target.closest('button, select, [draggable="true"], .cursor-pointer');

        // --- LEVEL 1: Drag & Drop (Mesin Cerdas vs Non-Cerdas) ---
        function Level1Mesin({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[1];

            const [droppedItems, setDroppedItems] = useState({}); 
            const [completed, setCompleted] = useState(false);
            const [dragOverTarget, setDragOverTarget] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [feedbackMsg, setFeedbackMsg] = useState("");

            const handleDragStart = (e, item) => { e.dataTransfer.setData("item", JSON.stringify(item)); };
            const handleDragOver = (e, targetId) => { e.preventDefault(); setDragOverTarget(targetId); };
            const handleDragLeave = (e) => { e.preventDefault(); setDragOverTarget(null); }
            const handleDrop = (e, target) => {
                e.preventDefault(); 
                setDragOverTarget(null);
                const itemData = e.dataTransfer.getData("item");
                if (itemData) {
                    const item = JSON.parse(itemData);
                    setDroppedItems(prev => ({ ...prev, [item.id]: target.id }));
                    setFeedbackMsg("");
                }
            };

            const handleRemoveItem = (itemId) => {
                setDroppedItems(prev => { const newItems = { ...prev }; delete newItems[itemId]; return newItems; });
                setFeedbackMsg("");
            };

            const handleItemClick = (item) => { setSelectedItem(selectedItem?.id === item.id ? null : item); };
            const handleTargetClick = (target) => { 
                if (selectedItem) {
                    setDroppedItems(prev => ({ ...prev, [selectedItem.id]: target.id }));
                    setSelectedItem(null);
                    setFeedbackMsg("");
                } 
            };

            const handleCheckAnswer = () => {
                let isAllCorrect = true;
                data.items.forEach(item => { if (droppedItems[item.id] !== item.matchId) isAllCorrect = false; });

                if (isAllCorrect) {
                    playSfx('correct');
                    for(let i=0; i<10; i++) { if (onCorrect) onCorrect(); }
                    setCompleted(true);
                } else {
                    playSfx('incorrect');
                    setFeedbackMsg("PERINGATAN: Ada mesin yang masuk ke klasifikasi yang salah. Mohon analisa ulang!");
                }
            };

            const allItemsDropped = Object.keys(droppedItems).length === data.items.length;

            return (
                <div className="flex flex-col h-full w-full max-w-7xl mx-auto flex-1 min-h-0 bg-slate-900/90 backdrop-blur-md rounded-2xl shadow-[0_0_30px_rgba(34,211,238,0.15)] p-4 md:p-6 border border-cyan-800">

                              {shuffledItems.map(item => (
                                !droppedItems[item.id] && (
                                  <div key={item.id} draggable onDragStart={(e) => handleDragStart(e, item)} onClick={() => handleItemClick(item)}
                                    className={`p-2 xl:p-3 rounded-lg border text-center aspect-square flex flex-col items-center justify-center cursor-grab active:cursor-grabbing select-none transition-all ${selectedItem?.id === item.id ? 'border-cyan-400 bg-cyan-900/50 scale-105 shadow-[0_0_15px_rgba(34,211,238,0.4)]' : 'border-slate-600 bg-slate-800 hover:border-cyan-700'}`}
                                  >
                                    <div className="h-1/2 w-full flex items-center justify-center mb-2">
                                        <span className="text-3xl md:text-4xl drop-shadow-md">{item.icon}</span>
                                    </div>
                                    <span className="font-bold text-[10px] md:text-xs text-slate-300 pointer-events-none leading-tight">{item.text}</span>
                                  </div>
                                )
                              ))}

                            </div>

                          {/* Target Klasifikasi */}

        // --- LEVEL 2: Kuis Analisis (Manusia vs Komputer) ---
        function Level2Visi({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[2];
            const [answers, setAnswers] = useState({});
            const [step, setStep] = useState('quiz'); 
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [scoreDetails, setScoreDetails] = useState(0);

            const flatQuestions = React.useMemo(() => {
                const arr = [];
                data.parts.forEach(part => {
                    part.questions.forEach(q => {
                        const originalOptions = [...q.options];
                        const shuffledOptions = shuffleArray(originalOptions);
                        
                        let newCorrect;
                        if (q.type === 'single') {
                            newCorrect = shuffledOptions.indexOf(originalOptions[q.correct]);
                        } else {
                            newCorrect = q.correct.map(idx => shuffledOptions.indexOf(originalOptions[idx]));
                        }

                        arr.push({
                            ...q,
                            options: shuffledOptions,
                            correct: newCorrect,
                            stimulusTitle: part.stimulusTitle,
                            stimulusText: part.stimulusText,
                        });
                    });
                });
                return arr;
            }, [data]);

            const currentQ = flatQuestions[currentQIndex];

            const handleSingle = (qId, optIdx) => { setAnswers(prev => ({ ...prev, [qId]: optIdx })); };
            const handleMultiple = (qId, optIdx) => {
                setAnswers(prev => {
                    const current = prev[qId] || [];
                    if (current.includes(optIdx)) return { ...prev, [qId]: current.filter(x => x !== optIdx) };
                    return { ...prev, [qId]: [...current, optIdx] }; 
                });
            };

            const isCurrentAnswered = currentQ.type === 'single' ? answers[currentQ.id] !== undefined : (answers[currentQ.id] && answers[currentQ.id].length > 1);

            const handleNext = () => { if (currentQIndex < flatQuestions.length - 1) setCurrentQIndex(prev => prev + 1); };
            const handlePrev = () => { if (currentQIndex > 0) setCurrentQIndex(prev => prev - 1); };

            const handleSubmit = () => {
                let correctAns = 0;
                flatQuestions.forEach(q => {
                    const userAns = answers[q.id];
                    if (q.type === 'single') {
                        if (userAns === q.correct) correctAns++;
                    } else if (q.type === 'multiple') {
                        if (Array.isArray(userAns) && userAns.length === q.correct.length && userAns.every(val => q.correct.includes(val))) correctAns++;
                    }
                });

                if (correctAns === flatQuestions.length) playSfx('correct');
                else playSfx('incorrect');

                setScoreDetails(correctAns);
                setStep('feedback');
            };

            const handleRetry = () => { setAnswers({}); setCurrentQIndex(0); setScoreDetails(0); setStep('quiz'); };
            const handleProceed = () => { for(let i = 0; i < scoreDetails; i++) { if (onCorrect) onCorrect(); } onComplete(); };

            if (step === 'feedback') {
                return (
                    <div className="flex flex-col h-full w-full max-w-4xl mx-auto pb-4 animate-fade-in justify-center">

                                    if (q.type === 'single') isCorrect = userAns === q.correct;

                                   let btnClass = `w-full text-left px-3 py-2.5 md:py-3 rounded-lg border text-sm transition-all flex items-start gap-3 ${isSelected ? 'border-cyan-500 bg-cyan-900/30 shadow-[0_0_10px_rgba(34,211,238,0.2)] text-cyan-100' : 'border-slate-700 bg-slate-800/80 hover:bg-slate-700 hover:border-slate-500 text-slate-300'}`;

        // --- LEVEL 3: Benar/Salah (Manfaat AI) ---

                    const newCorrectReasonIndex = shuffledReasons.indexOf(correctReasonText);

                    return { ...q, reasonOptions: shuffledReasons, correctReasonIndex: newCorrectReasonIndex };

            const currentQ = shuffledQuestions[currentQIndex];

            const handleStatement = (qId, statement) => { setAnswers(prev => ({ ...prev, [qId]: { ...prev[qId], statement } })); };

                const reasonIdx = parseInt(reasonIdxStr);
                setAnswers(prev => ({ ...prev, [qId]: { ...prev[qId], reasonIdx } }));
            };

        // --- LEVEL 4: Melengkapi Paragraf (Logika AI) ---
        function Level4Keputusan({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[4];
            const [droppedWords, setDroppedWords] = useState({}); 
            const [availableWords, setAvailableWords] = useState([]);
            const [selectedWord, setSelectedWord] = useState(null);
            const [dragOverBlank, setDragOverBlank] = useState(null);
            const [feedbackMsg, setFeedbackMsg] = useState("");
            const [completed, setCompleted] = useState(false);

            useEffect(() => {
                setAvailableWords(shuffleArray(data.words));
                setDroppedWords({});
            }, [data.words]);

            const handleDragStart = (e, word, sourceBlankId = null) => {
                e.dataTransfer.setData("word", JSON.stringify(word));
                e.dataTransfer.setData("source", sourceBlankId || "pool");
            };

            const handleDropOnBlank = (e, blankId) => {
                e.preventDefault();
                setDragOverBlank(null);
                const wordData = e.dataTransfer.getData("word");
                const source = e.dataTransfer.getData("source");
                
                if (wordData) {
                    const word = JSON.parse(wordData);
                    setAvailableWords(prev => prev.filter(w => w.id !== word.id));
                    setDroppedWords(prev => {
                        const newDropped = { ...prev };
                        if (source !== "pool" && source !== blankId) delete newDropped[source];
                        if (newDropped[blankId]) setAvailableWords(avail => [...avail, newDropped[blankId]]);
                        newDropped[blankId] = word;
                        return newDropped;
                    });
                    setFeedbackMsg("");
                    setSelectedWord(null);
                }
            };

            const handleDropOnPool = (e) => {
                e.preventDefault();
                const wordData = e.dataTransfer.getData("word");
                const source = e.dataTransfer.getData("source");
                
                if (wordData && source !== "pool") {
                    const word = JSON.parse(wordData);
                    setDroppedWords(prev => {
                        const newDropped = { ...prev };
                        delete newDropped[source];
                        return newDropped;
                    });
                    setAvailableWords(prev => {
                        if (!prev.find(w => w.id === word.id)) return [...prev, word];
                        return prev;
                    });
                    setFeedbackMsg("");
                }
            };
            
            const handleWordClick = (word) => { setSelectedWord(selectedWord?.id === word.id ? null : word); };

            const handleBlankClick = (blankId) => {
                if (selectedWord) {
                    if (droppedWords[blankId]) setAvailableWords(prev => [...prev, droppedWords[blankId]]);
                    setDroppedWords(prev => ({...prev, [blankId]: selectedWord}));
                    setAvailableWords(prev => prev.filter(w => w.id !== selectedWord.id));
                    setSelectedWord(null);
                    setFeedbackMsg("");
                } else if (droppedWords[blankId]) {
                    setAvailableWords(prev => [...prev, droppedWords[blankId]]);
                    setDroppedWords(prev => {
                        const newDropped = {...prev};
                        delete newDropped[blankId];
                        return newDropped;
                    });
                    setFeedbackMsg("");
                }
            };

            const handleCheckAnswer = () => {
                let isAllCorrect = true;
                let totalBlanks = 0;
                let filledBlanks = 0;

                data.paragraphs.forEach(p => {
                    p.sentences.forEach(s => {
                        totalBlanks++;
                        const dropped = droppedWords[s.blankId];
                        if (dropped) {
                            filledBlanks++;
                            if (dropped.text !== s.correct) isAllCorrect = false;
                        } else {
                            isAllCorrect = false;
                        }
                    });
                });

                if (filledBlanks < totalBlanks) {
                    setFeedbackMsg("PERINGATAN: Ada slot data yang kosong. Harap lengkapi algoritma.");
                    return;
                }

                if (isAllCorrect) {
                    playSfx('correct');
                    for(let i=0; i<6; i++) { if (onCorrect) onCorrect(); }
                    setCompleted(true);
                } else {
                    playSfx('incorrect');
                    setFeedbackMsg("ERROR: Rangkaian logika salah. Klik kata untuk mengembalikannya ke pool.");
                }
            };

            return (
                <div className="flex flex-col h-full w-full max-w-5xl mx-auto flex-1 min-h-0 bg-slate-900/90 backdrop-blur-md rounded-2xl shadow-[0_0_30px_rgba(34,211,238,0.15)] p-3 md:p-6 border border-cyan-800">
                   {!completed ? (
                       <div className="flex flex-col flex-1 min-h-0 overflow-hidden bg-slate-800/50 rounded-xl border border-slate-700 relative">
                           {/* Decoration */}
                           <div className="absolute top-0 right-0 w-full h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-50"></div>
                           
                           <div className="w-full p-4 md:p-6 flex flex-col flex-1 min-h-0">
                               <div className="bg-indigo-950/40 border-l-4 border-indigo-500 p-3 md:p-4 rounded-r-lg mb-4 text-indigo-100 font-medium text-xs md:text-sm whitespace-pre-wrap">
                                   <b className="text-indigo-400 font-tech">STIMULUS:</b> {data.stimulusText}
                               </div>

                               <div className="bg-slate-900/80 p-4 md:p-5 rounded-lg mb-4 text-center border border-dashed border-cyan-700 flex-shrink-0 shadow-inner"
                                    onDragOver={(e) => { e.preventDefault(); }}
                                    onDrop={handleDropOnPool}
                               >
                                   <p className="text-xs md:text-sm font-tech text-cyan-500 mb-3 tracking-widest">VARIABLE POOL (Drag/Click to inject):</p>
                                   <div className="flex flex-wrap gap-2 justify-center">
                                       {availableWords.map(word => (
                                            <div 
                                                key={word.id} draggable onDragStart={(e) => handleDragStart(e, word)} onClick={() => handleWordClick(word)}
                                                className={`px-3 py-1.5 md:px-4 md:py-2 rounded-md border font-bold text-xs md:text-sm cursor-grab active:cursor-grabbing shadow-sm transition-all select-none ${selectedWord?.id === word.id ? 'bg-cyan-600 border-cyan-400 text-slate-900 scale-105 shadow-[0_0_10px_rgba(34,211,238,0.5)]' : 'bg-slate-800 text-cyan-100 border-cyan-800 hover:border-cyan-500 hover:bg-slate-700'}`}
                                            >
                                                {word.text}
                                            </div>
                                       ))}
                                       {availableWords.length === 0 && <span className="text-xs text-slate-500 font-tech italic mt-1">Pool kosong.</span>}
                                   </div>
                               </div>

                               <div className="flex-grow overflow-y-auto pr-2 custom-scrollbar space-y-4">
                                    {data.paragraphs.map(p => (
                                        <div key={p.id} className="p-4 md:p-6 rounded-lg border border-slate-600 bg-slate-800 shadow-sm font-tech">
                                            {p.title && <h4 className="text-base md:text-lg font-black text-cyan-400 mb-3 border-b border-slate-700 pb-2 uppercase tracking-widest">{p.title}</h4>}
                                            <p className="text-sm md:text-base leading-[2.5] text-slate-300 font-medium">
                                                {p.sentences.map(s => (
                                                    <span key={s.id}>
                                                        {s.before}
                                                        <span 
                                                            onClick={() => handleBlankClick(s.blankId)} onDragOver={(e) => { e.preventDefault(); setDragOverBlank(s.blankId); }} onDragLeave={() => setDragOverBlank(null)} onDrop={(e) => handleDropOnBlank(e, s.blankId)}
                                                            className={`inline-block mx-1 min-w-[100px] h-7 md:h-8 text-center align-middle rounded border-b-2 cursor-pointer transition-all ${
                                                                dragOverBlank === s.blankId ? 'bg-cyan-900/50 border-cyan-400' : 'bg-slate-900 border-slate-500 border-dashed'
                                                            } ${droppedWords[s.blankId] ? 'bg-indigo-600 border-indigo-400 text-white font-bold shadow-inner font-sans' : ''}`}
                                                        >
                                                            {droppedWords[s.blankId] ? droppedWords[s.blankId].text : ''}
                                                        </span>
                                                        {s.after}
                                                    </span>
                                                ))}
                                            </p>
                                        </div>
                                    ))}
                               </div>

                               <div className="mt-4 flex flex-col items-center flex-shrink-0 pt-3 border-t border-slate-700">
                                   {feedbackMsg && <p className="text-rose-400 font-bold text-xs md:text-sm mb-3 bg-rose-950/30 px-5 py-2 rounded border border-rose-800 text-center w-full font-tech">{feedbackMsg}</p>}
                                   <button onClick={handleCheckAnswer} className="bg-cyan-600 text-slate-900 hover:bg-cyan-500 font-black py-2.5 px-8 md:px-10 rounded-lg shadow-[0_0_15px_rgba(34,211,238,0.3)] transition-all text-sm md:text-base flex items-center justify-center gap-2 w-full md:w-auto font-tech uppercase tracking-widest border-b-4 border-cyan-800 active:border-b-0 active:translate-y-1">
                                       <Icons.Cpu className="w-5 h-5" /> Run Script
                                   </button>
                               </div>
                           </div>
                       </div>
                   ) : (
                       <div className="bg-slate-800/80 p-8 md:p-12 rounded-2xl shadow-[0_0_30px_rgba(34,211,238,0.2)] text-center space-y-5 border border-cyan-600 max-w-3xl mx-auto animate-fade-in my-auto">
                         <div className="w-16 h-16 md:w-20 md:h-20 bg-cyan-900 rounded-full flex items-center justify-center mx-auto text-3xl md:text-4xl shadow-[0_0_20px_rgba(34,211,238,0.5)] border border-cyan-400">🧠</div>
                         <div>
                             <h3 className="text-xl md:text-3xl font-black text-cyan-300 uppercase tracking-widest mb-2 font-tech">Logika Berhasil Disusun!</h3>
                             <p className="text-sm md:text-base text-slate-300 leading-relaxed">Kamu memahami bahwa AI bekerja dengan menangkap <b>Input Data melalui Sensor</b>, memprosesnya dengan <b>Algoritma</b>, dan menghasilkan <b>Keputusan/Output</b> secara otomatis.</p>
                         </div>
                         <button onClick={onComplete} className="bg-cyan-600 text-slate-900 hover:bg-cyan-500 font-black w-full py-3 text-base md:text-lg rounded-lg shadow-[0_0_15px_rgba(34,211,238,0.3)] transition-all mt-4 font-tech tracking-wider border-b-4 border-cyan-800 active:border-b-0 active:translate-y-1 uppercase">Akses Ruang Utama 🚀</button>
                       </div>
                   )}
                </div>
            );
        }

        // --- LEVEL 5: PROYEK AKHIR (Merancang AI) ---

            const data = LEVEL_DATA[5];
            const [robotName, setRobotName] = useState("");
            const [taskField, setTaskField] = useState("");
            const [sensorInput, setSensorInput] = useState("");
            const [actionOutput, setActionOutput] = useState("");
            const [plan, setPlan] = useState("");
            const [reflection, setReflection] = useState("");
            const [step, setStep] = useState('project');

            const handleSubmitProject = () => { 
                if (!robotName || !taskField || !sensorInput || !actionOutput || !plan) {
                    alert("Akses ditolak: Lengkapi semua cetak biru (blueprint) robotmu terlebih dahulu!");
                    return;
                }

                playSfx('correct');
                saveData('final_project', {
                    'Nama Robot': robotName,
                    'Bidang': taskField,
                    'Input Sensor': sensorInput, 
                    'Output Tindakan': actionOutput, 
                    'Keunggulan AI': plan
                }); 
                setStep('reflection');
            };
            
            const handleFinish = () => {
                saveRef(reflection); 
                onComplete();
            };

            if (step === 'reflection') {
                return (
                    <div className="flex flex-col h-full w-full justify-center">
                        <ReflectionSection question={data.reflection} value={reflection} onChange={setReflection} onNext={handleFinish} />
                    </div>
                );

            return (
                <div className="flex flex-col h-full w-full max-w-7xl mx-auto flex-1 min-h-0 pb-4 bg-slate-900/90 backdrop-blur-md rounded-3xl p-3 md:p-6 border border-cyan-600 shadow-[0_0_40px_rgba(34,211,238,0.15)]">
                   <div className="bg-cyan-950/40 text-cyan-200 p-3 rounded-lg text-center font-bold text-xs md:text-sm border-l-4 border-cyan-500 shadow-sm flex items-center justify-center gap-2 mb-4 flex-shrink-0 font-tech tracking-wider uppercase">
                     <Icons.Cpu className="w-5 h-5 text-cyan-400" /> Tahap Akhir: Rancang Blueprint Asisten Robot AI
                   </div>

                   <div className="bg-slate-800/50 rounded-xl shadow-inner border border-slate-700 overflow-hidden flex flex-col md:flex-row flex-1 min-h-0 relative">
                        {/* Panel Kiri: Cerita */}
                        <div className="md:w-5/12 p-4 md:p-6 border-b md:border-b-0 md:border-r border-slate-700 flex flex-col min-h-0 overflow-y-auto custom-scrollbar relative z-10">
                            <h3 className="font-black text-cyan-400 mb-3 flex items-center gap-2 text-base md:text-xl flex-shrink-0 font-tech">
                                {data.stimulusTitle}
                            </h3>
                            <div className="text-slate-300 text-sm md:text-base whitespace-pre-wrap leading-relaxed font-medium bg-slate-900/50 p-4 rounded-lg border border-slate-700 shadow-inner mb-6 flex-1">
                                {data.stimulusText}
                            </div>

                            <div className="bg-indigo-950/30 p-4 rounded-lg border border-indigo-800 mt-auto shadow-sm flex-shrink-0">
                                <h4 className="font-black text-indigo-400 mb-1 text-xs md:text-sm font-tech">{data.tasks.t4.title}</h4>
                                <p className="text-xs text-indigo-200 font-medium leading-relaxed">{data.tasks.t4.desc}</p>
                            </div>
                        </div>

                        {/* Panel Kanan: Form */}
                        <div className="md:w-7/12 p-4 md:p-6 flex flex-col min-h-0 relative z-10">
                            <div className="space-y-5 flex-grow overflow-y-auto custom-scrollbar pr-2">

                                    <div className="border-b border-slate-700 pb-2 mb-3">
                                        <h4 className="font-bold text-cyan-300 text-sm md:text-base font-tech">{data.tasks.t1.title}</h4>

                                                <option value="Kesehatan">Kesehatan / Medis</option>
                                                <option value="Pendidikan">Pendidikan / Belajar</option>
                                                <option value="Lingkungan">Lingkungan / Kebersihan</option>
                                                <option value="Keamanan">Keamanan / Evakuasi</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                {/* Langkah 2: Alur Logika */}

                                            <label className="block text-xs text-emerald-400 mb-1.5 font-bold">📡 {data.tasks.t2.q1}</label>

        // --- END SCREEN & REFLECTION ---
        function EndScreen({ userData, correctCount, onRestart, playerName, playerSchool }) {
            const [isSaving, setIsSaving] = useState(false);
            const [saveStatus, setSaveStatus] = useState("idle"); 

            const handleSaveToGoogleSheets = async () => {
                if(!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("MASUKKAN_URL")) return alert("URL Database Induk belum dikonfigurasi.");
                setIsSaving(true);
                
                const payload = {
                    nama: playerName, sekolah: playerSchool, skor: correctCount, benar: correctCount,
                    proyek_robot: userData.final_project?.['Nama Robot'] || "-",
                    proyek_input: userData.final_project?.['Input Sensor'] || "-",
                    proyek_output: userData.final_project?.['Output Tindakan'] || "-",
                    refleksi: userData.ref5 || "-",
                };
                
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    setSaveStatus("success");
                } catch (error) { setSaveStatus("error"); } finally { setIsSaving(false); }
            };

            return (
                <div className="flex flex-col items-center justify-center gap-6 xl:gap-8 animate-fade-in w-full flex-1">
                  <div className="text-center bg-slate-900/90 backdrop-blur-sm p-6 md:p-8 rounded-2xl shadow-[0_0_30px_rgba(34,211,238,0.2)] w-full max-w-2xl border border-cyan-500">
                    <div className="w-20 h-20 md:w-28 md:h-28 bg-cyan-900/50 rounded-full flex items-center justify-center mx-auto text-4xl md:text-6xl shadow-[0_0_20px_rgba(34,211,238,0.5)] border border-cyan-400 mb-4">
                        <Icons.Award className="w-10 h-10 md:w-14 md:h-14 text-cyan-300 animate-pulse" />
                    </div>
                    <h2 className="text-2xl md:text-4xl font-black text-cyan-300 font-tech tracking-widest uppercase">Simulasi Selesai</h2>
                    <p className="text-sm md:text-lg text-slate-300 mt-2">Kadet Programmer: <span className="font-bold text-cyan-100">{playerName}</span></p>
                    <div className="mt-4 pt-4 border-t border-slate-700">
                        <span className="text-xs md:text-sm text-slate-500 font-tech">AKURASI SISTEM</span>
                        <div className="text-3xl md:text-5xl font-black text-cyan-400 font-tech mt-1">{correctCount} <span className="text-xl md:text-3xl text-cyan-700">/ 50</span></div>
                    </div>
                  </div>

                  <div className="w-full max-w-2xl bg-slate-900/90 backdrop-blur-sm p-5 md:p-6 rounded-2xl shadow-lg border border-indigo-600 relative text-sm md:text-base">
                    <h3 className="font-bold text-indigo-400 font-tech mb-3 border-b border-slate-700 pb-2">DATA BLUEPRINT TERSIMPAN:</h3>
                    <div className="space-y-3 max-h-48 overflow-y-auto pr-3 custom-scrollbar text-slate-300">
                      <p className="bg-slate-800/50 p-3 rounded-lg border border-slate-700"><b className="text-cyan-500 block text-xs">🤖 {userData.final_project ? userData.final_project['Nama Robot'] : '-'} ({userData.final_project ? userData.final_project['Bidang'] : '-'})</b> Logika: Mendeteksi [{userData.final_project ? userData.final_project['Input Sensor'] : '-'}] ➔ Melakukan [{userData.final_project ? userData.final_project['Output Tindakan'] : '-'}]</p>
                      <p className="bg-slate-800/50 p-3 rounded-lg border border-slate-700"><b className="text-indigo-400 block text-xs">✨ Keunggulan AI:</b> {userData.final_project ? userData.final_project['Keunggulan AI'] : '-'}</p>
                      <p className="bg-slate-800/50 p-3 rounded-lg border border-slate-700"><b className="text-emerald-400 block text-xs">🧠 Evaluasi Akhir:</b> "{userData.ref5 || '-'}"</p>
                    </div>
                  </div>

                  <div className="w-full max-w-2xl flex flex-col sm:flex-row gap-3">
                    {saveStatus === 'idle' && <button onClick={handleSaveToGoogleSheets} disabled={isSaving} className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(99,102,241,0.3)] transition-all font-tech tracking-wider uppercase border-b-4 border-indigo-800 active:border-b-0 active:translate-y-1">{isSaving ? "Uploading..." : <><Icons.Save className="w-4 h-4"/> Upload ke Markas</>}</button>}
                    {saveStatus === 'success' && <div className="flex-1 bg-emerald-900/50 text-emerald-400 py-3 rounded-lg text-center font-bold border border-emerald-600 font-tech">Upload Berhasil ✅</div>}
                    {saveStatus === 'error' && <div className="flex-1 bg-rose-900/50 text-rose-400 py-3 rounded-lg text-center font-bold border border-rose-600 font-tech">Error. <button onClick={()=>setSaveStatus('idle')} className="underline">Retry</button></div>}
                    <button onClick={onRestart} className="flex-1 bg-slate-700 hover:bg-slate-600 text-cyan-100 font-bold py-3 rounded-lg flex items-center justify-center gap-2 border border-slate-500 transition-all font-tech tracking-wider uppercase"><Icons.RefreshCcw className="w-4 h-4"/> Reboot Simulasi</button>
                  </div>
                </div>
            );
        }

        function ReflectionSection({ question, value, onChange, onNext }) {
            return (
                <div className="bg-slate-900/90 p-6 md:p-10 rounded-2xl shadow-[0_0_30px_rgba(34,211,238,0.2)] border border-cyan-600 w-full max-w-3xl mx-auto animate-fade-in my-auto">
                  <div className="w-16 h-16 md:w-20 md:h-20 bg-indigo-900/50 rounded-full flex items-center justify-center mx-auto text-3xl shadow-inner border border-indigo-500 mb-4">🤔</div>
                  <div className="text-center mb-6">
                    <h3 className="text-xl md:text-2xl font-black text-cyan-300 font-tech tracking-wider uppercase mb-2">Evaluasi Pemikiran</h3>
                    <p className="text-sm md:text-base font-medium text-slate-300 leading-relaxed whitespace-pre-wrap">{question}</p>
                  </div>
                  <textarea value={value} onChange={(e) => onChange(e.target.value)} className="w-full p-4 border rounded-lg text-sm md:text-base bg-slate-800 border-slate-600 outline-none focus:border-cyan-500 h-32 text-cyan-100 font-medium transition-colors resize-none mb-4" placeholder="Ketik logikamu di sini..." />
                  <button onClick={onNext} disabled={value.length < 5} className="bg-cyan-600 text-slate-900 hover:bg-cyan-500 font-black w-full py-3 text-sm md:text-base rounded-lg disabled:opacity-50 disabled:cursor-not-allowed shadow-[0_0_15px_rgba(34,211,238,0.3)] transition-all font-tech tracking-wider uppercase border-b-4 border-cyan-800 active:border-b-0 active:translate-y-1">Selesaikan Simulasi 🚀</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PetualanganBhinneka />);
    </script>
</body>
</html>
